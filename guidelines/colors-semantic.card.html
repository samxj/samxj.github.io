<!-- @dsCard group="Colors" viewport="700x150" name="Semantic surfaces" subtitle="bg / surface / border / text roles as used" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-page)}
  .row{display:flex;gap:16px;padding:20px;flex-wrap:wrap}
  .chip{width:150px;height:100px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:10px;font:var(--text-mono);font-size:10px}
</style>
<div class="row">
  <div class="chip" style="background:var(--bg-page);border:1px solid var(--border-hairline);color:var(--text-primary)">--bg-page</div>
  <div class="chip" style="background:var(--bg-surface);color:var(--text-primary)">--bg-surface</div>
  <div class="chip" style="background:var(--bg-surface-raised);color:var(--text-primary)">--bg-surface-raised</div>
  <div class="chip" style="background:var(--bg-page);border:1px solid var(--border-strong);color:var(--text-secondary)">--border-strong</div>
  <div class="chip" style="background:var(--accent);color:var(--text-on-accent)">--accent</div>
  <div class="chip" style="background:var(--accent-tint);color:var(--black-1)">--accent-tint</div>
</div>
